      impact: 9
      confidence: 8
      ease: 7
      total: 8.0
    confidence_level: 0.7
    evidence_log:
      - date: "2026-04-07"
        evidence_type: "experiment"
        summary: "API spike confirmed LSCopyDefaultRoleHandlerForContentType works, ~0.16ms/UTI, returns all handlers. App bundle scanning finds all claimed types."
        confidence_delta: 0.4
    status: active

  - name: "App-centric view"
    goal_connection: "Ship usable v0.1"
    description: "View file types grouped by app -- 'Show me everything VS Code claims' or 'everything Chrome hijacked.' Built from CFBundleDocumentTypes scanning."
    ice_score:
      impact: 8
      confidence: 7
      ease: 7
      total: 7.3
    confidence_level: 0.7
    evidence_log:
      - date: "2026-04-07"
        evidence_type: "experiment"
        summary: "Spike confirmed app bundle scanning works. VS Code claims 65 types, VLC 102. Data is rich and available."
        confidence_delta: 0.4
    status: active

  - name: "Bulk reassign"
    goal_connection: "Ship usable v0.1"
    description: "Select multiple file types, assign to one app. Each change triggers a macOS confirmation dialog. UX must make the dialog sequence predictable and manageable."
    ice_score:
      impact: 9
      confidence: 6
      ease: 5
      total: 6.7
    confidence_level: 0.5
    evidence_log:
      - date: "2026-04-07"
        evidence_type: "experiment"
        summary: "LSSetDefaultRoleHandlerForContentType works but triggers one macOS dialog per type. macOS groups related extensions (.txt/.text). API returns 0 immediately, change deferred until user clicks."
        confidence_delta: 0.3
    status: active

  - name: "Snapshot and restore"
    goal_connection: "Ship usable v0.1"
    description: "Save current file type associations as a snapshot. Restore after app installs overwrite them. The gap no existing tool fills."
    ice_score:
      impact: 8
      confidence: 5
      ease: 4
      total: 5.7
    confidence_level: 0.3
    evidence_log:
      - date: "2026-04-07"
        evidence_type: "market_data"
        summary: "Identified as clearest gap across all tools (0xdevalias, Joel Mama blog). Restore = bulk set = dialog storm. Deferred to v0.2."
        confidence_delta: 0.0
    status: shelved
    kill_reason: "Deferred to v0.2. Depends on solving bulk-write UX first."

